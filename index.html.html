<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #12171B;
    --panel: #1B2227;
    --panel-2: #222B31;
    --text: #F1ECE3;
    --text-dim: #93A0A6;
    --essence: #E8A33D;
    --essence-dark: #B97C22;
    --diesel: #3AAE8E;
    --diesel-dark: #227A62;
    --alert: #D9534F;
    --border: #2C363D;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{ box-sizing: border-box; }
  .app{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    border-radius: 14px;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .app h1{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.5px;
    margin: 0 0 4px 0;
    text-transform: uppercase;
  }
  .app .subtitle{
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 18px 0;
  }
  .tabs{
    display: flex;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .tab-btn{
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover{ color: var(--text); }
  .tab-btn.active{ color: var(--text); border-bottom-color: var(--essence); }
  .panel{ display: none; }
  .panel.active{ display: block; }

  .alert-banner{
    background: rgba(217,83,79,0.12);
    border: 1px solid var(--alert);
    color: #F3B7B5;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .alert-banner.show{ display: block; }

  .gauges{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  @media (max-width: 560px){ .gauges{ grid-template-columns: 1fr; } }

  .gauge-card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .gauge-card .product-name{
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .gauge-card.essence .product-name{ color: var(--essence); }
  .gauge-card.diesel .product-name{ color: var(--diesel); }
  .gauge-svg{ width: 180px; height: 108px; }
  .gauge-pct{
    font-family: var(--font-display);
    font-size: 26px;
    margin-top: -6px;
  }
  .gauge-stock{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .gauge-value{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }

  .summary-row{
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .summary-card{
    flex: 1;
    min-width: 140px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .summary-card .label{ font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value{ font-family: var(--font-mono); font-size: 18px; margin-top: 4px; }

  .settings-toggle{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    margin-bottom: 14px;
  }
  .settings-toggle:hover{ color: var(--text); border-color: var(--text-dim); }
  .settings-box{
    display: none;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .settings-box.show{ display: block; }
  .settings-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 560px){ .settings-grid{ grid-template-columns: 1fr; } }

  .field{ margin-bottom: 12px; }
  .field label{
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .field input, .field select{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 10px;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 14px;
  }
  .field input:focus, .field select:focus{ outline: none; border-color: var(--essence); }

  .form-row{ display: flex; gap: 12px; }
  .form-row > div{ flex: 1; }

  button.primary{
    background: var(--essence);
    color: #1B140A;
    border: none;
    font-family: var(--font-display);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 13px;
    padding: 11px 16px;
    border-radius: 7px;
    cursor: pointer;
    width: 100%;
    transition: filter .15s;
  }
  button.primary:hover{ filter: brightness(1.1); }
  button.primary.diesel-btn{ background: var(--diesel); color: #082C22; }

  .type-toggle{ display: flex; gap: 8px; margin-bottom: 14px; }
  .type-toggle button{
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-display);
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
    padding: 10px;
    border-radius: 7px;
    cursor: pointer;
  }
  .type-toggle button.active{ color: var(--bg); background: var(--text); border-color: var(--text); }

  .ecart-box{
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin: 10px 0 14px 0;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .ecart-box .ecart-val.pos{ color: var(--diesel); }
  .ecart-box .ecart-val.neg{ color: var(--alert); }

  table{ width: 100%; border-collapse: collapse; font-size: 13px; }
  th{
    text-align: left;
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  td{
    padding: 9px 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12.5px;
  }
  .badge{
    display: inline-block;
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 11px;
    font-family: var(--font-body);
    font-weight: 600;
  }
  .badge.livraison{ background: rgba(58,174,142,0.18); color: var(--diesel); }
  .badge.vente{ background: rgba(232,163,61,0.18); color: var(--essence); }
  .badge.ajustement{ background: rgba(147,160,166,0.18); color: var(--text-dim); }
  .del-btn{
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
  }
  .del-btn:hover{ color: var(--alert); }
  .empty-state{
    text-align: center;
    color: var(--text-dim);
    padding: 30px 10px;
    font-size: 13px;
  }
  .reset-link{
    display: block;
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }
  .reset-link:hover{ color: var(--alert); }
  .loading{ text-align:center; color:var(--text-dim); padding: 40px; font-family: var(--font-mono); font-size: 13px; }
</style>

<div class="app">
  <h1>Stock Carburant</h1>
  <p class="subtitle">Station-service — Essence &amp; Diesel</p>

  <div id="loadingMsg" class="loading">Chargement des données...</div>

  <div id="mainContent" style="display:none;">
    <div id="alertBanner" class="alert-banner"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">Tableau de bord</button>
      <button class="tab-btn" data-tab="mouvement">Livraison / Vente</button>
      <button class="tab-btn" data-tab="inventaire">Inventaire</button>
      <button class="tab-btn" data-tab="historique">Historique</button>
    </div>

    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <button class="settings-toggle" id="toggleSettings">⚙ Paramètres des cuves</button>
      <div class="settings-box" id="settingsBox">
        <div class="settings-grid">
          <div>
            <div class="field"><label>Capacité cuve Essence (gallons)</label><input type="number" id="cap-essence" min="0"></div>
            <div class="field"><label>Prix Essence (HTG / gallon)</label><input type="number" id="price-essence" min="0"></div>
          </div>
          <div>
            <div class="field"><label>Capacité cuve Diesel (gallons)</label><input type="number" id="cap-diesel" min="0"></div>
            <div class="field"><label>Prix Diesel (HTG / gallon)</label><input type="number" id="price-diesel" min="0"></div>
          </div>
        </div>
        <button class="primary" id="saveSettings" style="margin-top:6px;">Enregistrer</button>
      </div>

      <div class="gauges">
        <div class="gauge-card essence">
          <div class="product-name">Essence</div>
          <svg class="gauge-svg" viewBox="0 0 200 115">
            <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="var(--border)" stroke-width="14" stroke-linecap="round"/>
            <path id="arc-essence" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="var(--essence)" stroke-width="14" stroke-linecap="round" stroke-dasharray="251 251" stroke-dashoffset="251"/>
            <line id="needle-essence" x1="100" y1="100" x2="100" y2="35" stroke="#F1ECE3" stroke-width="3" stroke-linecap="round" transform="rotate(-90,100,100)"/>
            <circle cx="100" cy="100" r="6" fill="#F1ECE3"/>
            <text x="16" y="112" fill="var(--text-dim)" font-size="10" font-family="IBM Plex Mono">E</text>
            <text x="178" y="112" fill="var(--text-dim)" font-size="10" font-family="IBM Plex Mono">F</text>
          </svg>
          <div class="gauge-pct" id="pct-essence">0%</div>
          <div class="gauge-stock" id="stock-essence">0 gal / 0 gal</div>
          <div class="gauge-value" id="value-essence">Valeur: 0 HTG</div>
        </div>

        <div class="gauge-card diesel">
          <div class="product-name">Diesel</div>
          <svg class="gauge-svg" viewBox="0 0 200 115">
            <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="var(--border)" stroke-width="14" stroke-linecap="round"/>
            <path id="arc-diesel" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="var(--diesel)" stroke-width="14" stroke-linecap="round" stroke-dasharray="251 251" stroke-dashoffset="251"/>
            <line id="needle-diesel" x1="100" y1="100" x2="100" y2="35" stroke="#F1ECE3" stroke-width="3" stroke-linecap="round" transform="rotate(-90,100,100)"/>
            <circle cx="100" cy="100" r="6" fill="#F1ECE3"/>
            <text x="16" y="112" fill="var(--text-dim)" font-size="10" font-family="IBM Plex Mono">E</text>
            <text x="178" y="112" fill="var(--text-dim)" font-size="10" font-family="IBM Plex Mono">F</text>
          </svg>
          <div class="gauge-pct" id="pct-diesel">0%</div>
          <div class="gauge-stock" id="stock-diesel">0 gal / 0 gal</div>
          <div class="gauge-value" id="value-diesel">Valeur: 0 HTG</div>
        </div>
      </div>

      <div class="summary-row">
        <div class="summary-card">
          <div class="label">Valeur totale du stock</div>
          <div class="value" id="totalValue">0 HTG</div>
        </div>
        <div class="summary-card">
          <div class="label">Mouvements enregistrés</div>
          <div class="value" id="totalMovements">0</div>
        </div>
      </div>
    </div>

    <!-- MOUVEMENT -->
    <div class="panel" id="panel-mouvement">
      <div class="type-toggle">
        <button class="active" data-type="livraison" id="btn-type-livraison">Livraison (entrée)</button>
        <button data-type="vente" id="btn-type-vente">Vente (sortie)</button>
      </div>
      <div class="field">
        <label>Produit</label>
        <select id="mv-produit">
          <option value="essence">Essence</option>
          <option value="diesel">Diesel</option>
        </select>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Quantité (gallons)</label>
          <input type="number" id="mv-quantite" min="0" step="1" placeholder="0">
        </div>
        <div class="field">
          <label>Prix unitaire (HTG/gal) — optionnel</label>
          <input type="number" id="mv-prix" min="0" step="1" placeholder="prix actuel">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="mv-date">
        </div>
        <div class="field">
          <label>Note (optionnel)</label>
          <input type="text" id="mv-note" placeholder="ex: camion Total, client X...">
        </div>
      </div>
      <button class="primary" id="mv-submit">Enregistrer la livraison</button>
    </div>

    <!-- INVENTAIRE -->
    <div class="panel" id="panel-inventaire">
      <div class="field">
        <label>Produit à inventorier</label>
        <select id="inv-produit">
          <option value="essence">Essence</option>
          <option value="diesel">Diesel</option>
        </select>
      </div>
      <div class="field">
        <label>Comptage physique (gallons mesurés dans la cuve)</label>
        <input type="number" id="inv-comptage" min="0" step="1" placeholder="0">
      </div>
      <div class="ecart-box" id="ecartBox">
        Stock système: <span id="inv-systeme">0</span> gal — Entrez le comptage pour voir l'écart.
      </div>
      <button class="primary" id="inv-submit">Valider l'ajustement</button>
    </div>

    <!-- HISTORIQUE -->
    <div class="panel" id="panel-historique">
      <div id="historyTableWrap"></div>
      <button class="reset-link" id="resetAll">Réinitialiser toutes les données</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'station-carburant-data';
  let state = null;

  function defaultState(){
    return {
      tanks: {
        essence: { label: 'Essence', capacity: 2500, stock: 1500, price: 550 },
        diesel:  { label: 'Diesel',  capacity: 2500, stock: 1800, price: 520 }
      },
      movements: []
    };
  }

  function loadState(){
    // Affiche tout de suite avec des valeurs par défaut, sans attendre le réseau.
    state = defaultState();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderAll();
    // Charge les vraies données sauvegardées en arrière-plan, sans bloquer l'affichage.
    syncFromStorage();
  }

  async function syncFromStorage(){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        state = JSON.parse(res.value);
        renderAll();
      } else {
        await persist();
      }
    } catch(e){
      await persist();
    }
  }

  async function persist(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
    } catch(e){
      console.error('Erreur de sauvegarde', e);
    }
  }

  function fmt(n){
    return Number(n || 0).toLocaleString('fr-FR', { maximumFractionDigits: 0 });
  }

  // ---------- TABS ----------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      if(btn.dataset.tab === 'inventaire') updateEcartDisplay();
      if(btn.dataset.tab === 'historique') renderHistory();
    });
  });

  // ---------- SETTINGS ----------
  document.getElementById('toggleSettings').addEventListener('click', () => {
    const box = document.getElementById('settingsBox');
    box.classList.toggle('show');
    if(box.classList.contains('show')){
      document.getElementById('cap-essence').value = state.tanks.essence.capacity;
      document.getElementById('price-essence').value = state.tanks.essence.price;
      document.getElementById('cap-diesel').value = state.tanks.diesel.capacity;
      document.getElementById('price-diesel').value = state.tanks.diesel.price;
    }
  });

  document.getElementById('saveSettings').addEventListener('click', async () => {
    state.tanks.essence.capacity = Number(document.getElementById('cap-essence').value) || 0;
    state.tanks.essence.price = Number(document.getElementById('price-essence').value) || 0;
    state.tanks.diesel.capacity = Number(document.getElementById('cap-diesel').value) || 0;
    state.tanks.diesel.price = Number(document.getElementById('price-diesel').value) || 0;
    await persist();
    renderAll();
    document.getElementById('settingsBox').classList.remove('show');
  });

  // ---------- GAUGES ----------
  const ARC_LENGTH = 251; // approx length of the semicircle path (r=80)

  function renderGauge(key){
    const tank = state.tanks[key];
    const pct = tank.capacity > 0 ? Math.min(100, Math.max(0, (tank.stock / tank.capacity) * 100)) : 0;
    const offset = ARC_LENGTH - (ARC_LENGTH * pct / 100);
    document.getElementById('arc-' + key).setAttribute('stroke-dashoffset', offset);
    const angle = -90 + (pct / 100) * 180;
    document.getElementById('needle-' + key).setAttribute('transform', `rotate(${angle},100,100)`);
    document.getElementById('pct-' + key).textContent = Math.round(pct) + '%';
    document.getElementById('stock-' + key).textContent = fmt(tank.stock) + ' gal / ' + fmt(tank.capacity) + ' gal';
    document.getElementById('value-' + key).textContent = 'Valeur: ' + fmt(tank.stock * tank.price) + ' HTG';
  }

  function renderAlert(){
    const banner = document.getElementById('alertBanner');
    const low = [];
    ['essence','diesel'].forEach(key => {
      const t = state.tanks[key];
      const pct = t.capacity > 0 ? (t.stock / t.capacity) * 100 : 0;
      if(pct < 20) low.push(t.label);
    });
    if(low.length){
      banner.textContent = '⚠ Stock bas : ' + low.join(', ') + ' — pense à commander une livraison.';
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }
  }

  function renderSummary(){
    const totalValue = state.tanks.essence.stock * state.tanks.essence.price + state.tanks.diesel.stock * state.tanks.diesel.price;
    document.getElementById('totalValue').textContent = fmt(totalValue) + ' HTG';
    document.getElementById('totalMovements').textContent = state.movements.length;
  }

  function renderAll(){
    renderGauge('essence');
    renderGauge('diesel');
    renderAlert();
    renderSummary();
    renderHistory();
  }

  // ---------- MOUVEMENT ----------
  let currentType = 'livraison';
  document.getElementById('btn-type-livraison').addEventListener('click', () => setType('livraison'));
  document.getElementById('btn-type-vente').addEventListener('click', () => setType('vente'));

  function setType(type){
    currentType = type;
    document.getElementById('btn-type-livraison').classList.toggle('active', type === 'livraison');
    document.getElementById('btn-type-vente').classList.toggle('active', type === 'vente');
    const submitBtn = document.getElementById('mv-submit');
    submitBtn.textContent = type === 'livraison' ? 'Enregistrer la livraison' : 'Enregistrer la vente';
    submitBtn.classList.toggle('diesel-btn', type === 'vente');
  }

  document.getElementById('mv-date').valueAsDate = new Date();

  document.getElementById('mv-submit').addEventListener('click', async () => {
    const produit = document.getElementById('mv-produit').value;
    const qty = Number(document.getElementById('mv-quantite').value);
    const priceInput = document.getElementById('mv-prix').value;
    const date = document.getElementById('mv-date').value || new Date().toISOString().slice(0,10);
    const note = document.getElementById('mv-note').value.trim();

    if(!qty || qty <= 0){
      alert('Entre une quantité valide en gallons.');
      return;
    }

    const tank = state.tanks[produit];
    const unitPrice = priceInput ? Number(priceInput) : tank.price;

    if(currentType === 'livraison'){
      tank.stock += qty;
      if(priceInput) tank.price = unitPrice;
    } else {
      if(qty > tank.stock){
        if(!confirm('La quantité dépasse le stock actuel (' + fmt(tank.stock) + ' gal). Continuer quand même ?')) return;
      }
      tank.stock = Math.max(0, tank.stock - qty);
    }

    state.movements.unshift({
      id: Date.now(),
      date, type: currentType, produit, quantite: qty, prix: unitPrice, note
    });

    await persist();
    renderAll();
    document.getElementById('mv-quantite').value = '';
    document.getElementById('mv-prix').value = '';
    document.getElementById('mv-note').value = '';
  });

  // ---------- INVENTAIRE ----------
  document.getElementById('inv-produit').addEventListener('change', updateEcartDisplay);
  document.getElementById('inv-comptage').addEventListener('input', updateEcartDisplay);

  function updateEcartDisplay(){
    const produit = document.getElementById('inv-produit').value;
    const tank = state.tanks[produit];
    const comptageVal = document.getElementById('inv-comptage').value;
    document.getElementById('inv-systeme').textContent = fmt(tank.stock);
    const box = document.getElementById('ecartBox');
    if(comptageVal === ''){
      box.innerHTML = 'Stock système: <span id="inv-systeme">' + fmt(tank.stock) + '</span> gal — Entrez le comptage pour voir l\'écart.';
      return;
    }
    const comptage = Number(comptageVal);
    const ecart = comptage - tank.stock;
    const cls = ecart >= 0 ? 'pos' : 'neg';
    const sign = ecart > 0 ? '+' : '';
    box.innerHTML = 'Stock système: ' + fmt(tank.stock) + ' gal &nbsp;|&nbsp; Comptage: ' + fmt(comptage) +
      ' gal &nbsp;|&nbsp; Écart: <span class="ecart-val ' + cls + '">' + sign + fmt(ecart) + ' gal</span>';
  }

  document.getElementById('inv-submit').addEventListener('click', async () => {
    const produit = document.getElementById('inv-produit').value;
    const comptageVal = document.getElementById('inv-comptage').value;
    if(comptageVal === ''){
      alert('Entre le comptage physique de la cuve.');
      return;
    }
    const comptage = Number(comptageVal);
    const tank = state.tanks[produit];
    const ecart = comptage - tank.stock;
    tank.stock = comptage;
    state.movements.unshift({
      id: Date.now(),
      date: new Date().toISOString().slice(0,10),
      type: 'ajustement', produit, quantite: ecart, prix: tank.price,
      note: 'Ajustement inventaire (écart ' + (ecart >= 0 ? '+' : '') + fmt(ecart) + ' gal)'
    });
    await persist();
    renderAll();
    document.getElementById('inv-comptage').value = '';
    updateEcartDisplay();
    alert('Inventaire validé. Stock ' + tank.label + ' mis à jour : ' + fmt(comptage) + ' gal.');
  });

  // ---------- HISTORIQUE ----------
  function renderHistory(){
    const wrap = document.getElementById('historyTableWrap');
    if(!state.movements.length){
      wrap.innerHTML = '<div class="empty-state">Aucun mouvement enregistré pour l\'instant.</div>';
      return;
    }
    let rows = state.movements.map(m => {
      const tank = state.tanks[m.produit];
      const sign = m.type === 'vente' ? '-' : (m.type === 'livraison' ? '+' : (m.quantite >= 0 ? '+' : ''));
      const qtyDisplay = m.type === 'ajustement' ? fmt(m.quantite) : fmt(Math.abs(m.quantite));
      const total = Math.abs(m.quantite) * m.prix;
      return `<tr>
        <td>${m.date}</td>
        <td><span class="badge ${m.type}">${m.type}</span></td>
        <td>${tank ? tank.label : m.produit}</td>
        <td>${sign}${qtyDisplay} gal</td>
        <td>${fmt(m.prix)} HTG/gal</td>
        <td>${fmt(total)} HTG</td>
        <td style="font-family:Inter;color:var(--text-dim);font-size:11px;">${m.note || ''}</td>
        <td><button class="del-btn" data-id="${m.id}" title="Supprimer">✕</button></td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table>
      <thead><tr>
        <th>Date</th><th>Type</th><th>Produit</th><th>Quantité</th><th>Prix</th><th>Total</th><th>Note</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

    wrap.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.id);
        const idx = state.movements.findIndex(m => m.id === id);
        if(idx === -1) return;
        const m = state.movements[idx];
        if(!confirm('Supprimer ce mouvement ?')) return;
        const tank = state.tanks[m.produit];
        if(m.type === 'livraison') tank.stock = Math.max(0, tank.stock - m.quantite);
        if(m.type === 'vente') tank.stock += m.quantite;
        // les ajustements ne sont pas réversibles automatiquement (comptage historique)
        state.movements.splice(idx, 1);
        await persist();
        renderAll();
      });
    });
  }

  // ---------- RESET ----------
  document.getElementById('resetAll').addEventListener('click', async () => {
    if(!confirm('Ceci va effacer toutes les données (stocks et historique). Continuer ?')) return;
    state = defaultState();
    await persist();
    renderAll();
  });

  loadState();
})();
</script>
